services:
  - type: web
    name: visionone-jira-webhook
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: JIRA_BASE_URL
        sync: false
      - key: JIRA_USER_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: JIRA_PROJECT_KEY
        sync: false
      - key: JIRA_ISSUE_TYPE_ID
        sync: false
      - key: VISIONONE_WEBHOOK_SECRET
        sync: false
      - key: VISIONONE_API_BASE
        value: https://api.xdr.trendmicro.com
      - key: VISIONONE_TOKEN
        sync: false
      - key: JIRA_FIELD_CREATED_AT
        sync: false
      - key: JIRA_FIELD_HOST_NAME
        sync: false
      - key: JIRA_FIELD_ALERT_ID
        sync: false
